<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass Calculator</title>
  <link rel="stylesheet" href="./index.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <a class="Documentary-btn" href="./crystal_calc_documentation.html"><i class="fa-brands fa-markdown"></i> Documentation</a>

  <main class="wrap">
    <section class="calculator" aria-label="Glass calculator">
      <div class="topbar">
        <div class="badge">Crystal Calc</div>
        <div class="dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="display" aria-live="polite">
        <div id="history"></div>
        <div id="result">0</div>
      </div>

      <div class="keys">
        <button class="danger" data-action="clear">AC</button>
        <button class="danger" data-action="delete">DEL</button>
        <button class="op" data-value="%">%</button>
        <button class="op" data-value="/">÷</button>

        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button class="op" data-value="*">×</button>

        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button class="op" data-value="-">−</button>

        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button class="op" data-value="+">+</button>

        <button class="wide" data-value="0">0</button>
        <button data-value=".">.</button>
        <button class="equal" data-action="equals">=</button>
      </div>

      <div class="footer">Created by Tanishq Saxena | as WebDeveloper Intern | By InternPE | @2026 copyright</div>
    </section>
  </main>
  <script src="index.js"></script>
</body>
</html>
